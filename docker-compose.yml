services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: mysqlpw
    ports:
      - "49154:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmysqlpw"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
