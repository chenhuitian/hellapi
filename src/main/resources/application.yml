server:
  port: 8090

spring:
  application:
    name: hellapi
  datasource:
    url: jdbc:mysql://host.docker.internal:49154/hellapi?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: mysqlpw
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: never
  messages:
    basename: messages
    encoding: UTF-8

# Moomoo OpenAPI - enable and configure when OpenD is running
moomoo:
  enabled: false
  host: 127.0.0.1
  port: 11111
  paper-trading: true

# Auto-sell schedule: when price >= bought + 10%, place SELL order
schedule-trade:
  enabled: false
  interval-ms: 300000   # 5 minutes
  auto-sell-threshold-percent: 10

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
